name: PHP-GTK3 C++ CI (No-Build Checks)

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [master]

jobs:
  cpp-static-analysis:
    name: C++ static analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      # These are the dev headers needed to compile (not link) every source
      # file, including the Glade/libwnck/WebKit ones, which are only
      # compiled in when WITH_GLADEUI/WITH_LIBWNCK/WITH_WEBKIT are set below.
      # `bear` records compiler invocations into compile_commands.json.
      - name: Install GTK/Glade/GtkSourceView/libwnck/WebKit dev headers
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev libgladeui-dev libgtksourceview-3.0-dev \
            libwnck-3-dev libwebkit2gtk-4.1-dev bear

      # Only PHP-CPP's public headers (phpcpp.h + include/) are needed: no
      # php-gtk3 source includes any php-src/Zend header directly, only
      # <phpcpp.h>. So a header-only shallow clone is enough; no PHP-CPP
      # build/link is required to generate an accurate compile database.
      #
      # phpcpp.h itself uses #include <phpcpp/xxx.h>, which only resolves
      # once installed (PHP-CPP's own `make install` copies phpcpp.h next to
      # include/*.h renamed into a phpcpp/ subdirectory) - a raw clone's
      # include/ directory doesn't match that layout, so replicate it here
      # without needing PHP-CPP's own build/configure.
      - name: Fetch PHP-CPP public headers
        run: |
          git clone --depth 1 https://github.com/fast-debug/PHP-CPP.git /tmp/phpcpp-src
          mkdir -p /tmp/PHP-CPP/phpcpp
          cp /tmp/phpcpp-src/phpcpp.h /tmp/PHP-CPP/
          cp /tmp/phpcpp-src/include/*.h /tmp/PHP-CPP/phpcpp/

      # Compiles every object file (but does not link the final .so, so no
      # libphpcpp is needed) purely to capture accurate per-file compiler
      # flags/include paths into compile_commands.json for clang-tidy.
      - name: Generate compile_commands.json
        run: |
          make compile_commands \
            WITH_GLADEUI=1 WITH_LIBWNCK=1 WITH_WEBKIT=1 \
            PHPFLAGS="-I/tmp/PHP-CPP"

      # C++ linting only; this does NOT link/produce the extension.
      # Restrict to C++ sources (.cpp implementation files, no headers) in
      # this repo; there are no other .cpp files outside main.cpp/php-gtk.cpp/
      # src/**, so the default file discovery already covers exactly those.
      - name: C++ Linter (clang-tidy/clang-format)
        id: cpp-linter
        uses: cpp-linter/cpp-linter-action@v2
        with:
          # Only .cpp implementation files, not headers
          extensions: cpp
          # Analyze every matching file, not just ones changed in a diff -
          # this workflow also runs on push/workflow_dispatch, which have no
          # meaningful "changed files" diff to restrict to
          files-changed-only: false
          # Compile database generated above, so clang-tidy knows the real
          # GTK/Glade/GtkSourceView/libwnck/WebKit/PHP-CPP include paths
          database: .
          # Do not try to auto-fix code; just report
          style: file
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # cpp-linter-action doesn't fail the step itself on findings; it only
      # reports via its `checks-failed` output, which we turn into a real
      # job failure here.
      - name: Fail if clang-tidy/clang-format reported issues
        if: steps.cpp-linter.outputs.checks-failed != '0'
        run: |
          echo "clang-tidy/clang-format found issues (checks-failed=${{ steps.cpp-linter.outputs.checks-failed }})"
          exit 1

  markdown-metadata:
    name: Markdown metadata check (no build)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Basic Markdown presence
        run: |
          echo "Listing key Markdown files (if present):"
          ls README.md || echo "README.md not found"
          ls .github/copilot-instructions.md || echo ".github/copilot-instructions.md not found"
